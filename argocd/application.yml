apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentiment-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/johnthebrat7/Corporate-CI-CD-pipeline.git
    targetRevision: main
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true